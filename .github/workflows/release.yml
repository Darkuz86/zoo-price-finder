name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          BASE_URL="${BASE_URL:-/}"
          echo "Building with BASE_URL=$BASE_URL"
          BASE_URL="$BASE_URL" npm run build

      - name: Archive dist
        run: |
          test -d dist
          zip -r zoo-price-finder-dist.zip dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zoo-price-finder-dist.zip
